<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBI NetBanking — Protected by AEGIS-X</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0e17; color: #f1f5f9; min-height: 100vh; }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .header h1 { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    .header .badge { font-size: 8px; padding: 3px 8px; border-radius: 20px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #10B981; font-family: 'JetBrains Mono'; font-weight: 600; letter-spacing: 0.08em; }
    .card { background: linear-gradient(145deg, #0c1524, #162032, #1a3045); border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; border: 1px solid rgba(16,185,129,0.1); position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: -30px; right: -20px; width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, rgba(16,185,129,0.06), transparent 70%); }
    .card-number { font-size: 16px; font-family: 'JetBrains Mono'; letter-spacing: 0.15em; color: rgba(255,255,255,0.8); margin: 12px 0; }
    .card-balance { font-size: 24px; font-weight: 900; color: #10B981; }
    .card-label { font-size: 8px; color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono'; text-transform: uppercase; letter-spacing: 0.12em; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); font-family: 'JetBrains Mono'; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; height: 42px; padding: 0 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: #f1f5f9; font-size: 14px; font-weight: 600; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus { border-color: rgba(16,185,129,0.4); }
    .form-group select { appearance: none; cursor: pointer; }
    .btn { width: 100%; height: 44px; border-radius: 10px; border: none; background: linear-gradient(135deg, #10B981, #059669); color: white; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s, transform 0.1s; }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .trust-panel { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px 16px; margin-top: 16px; }
    .trust-panel .title { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono'; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
    .metric-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .metric-row:last-child { border-bottom: none; }
    .metric-row .label { font-size: 11px; color: rgba(255,255,255,0.5); }
    .metric-row .value { font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono'; }
    .result { margin-top: 14px; padding: 14px 16px; border-radius: 12px; display: none; }
    .result.show { display: flex; align-items: center; gap: 10px; }
    .result.allow { background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.2); }
    .result.block { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); }
    .result.stepup { background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.2); }
    .result .icon { font-size: 20px; }
    .result .text { font-size: 12px; font-weight: 600; }
    .result .sub { font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .log { background: #000; border-radius: 10px; padding: 10px 12px; margin-top: 14px; max-height: 120px; overflow-y: auto; font-family: 'JetBrains Mono'; font-size: 9px; color: #64748b; border: 1px solid rgba(255,255,255,0.04); }
    .log .entry { margin-bottom: 2px; }
    .log .entry.trust { color: #10B981; }
    .log .entry.alert { color: #EF4444; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-dot.online { background: #10B981; box-shadow: 0 0 6px #10B981; }
    .status-dot.offline { background: #EF4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏦 CBI NetBanking</h1>
      <span class="badge"><span class="status-dot" id="statusDot"></span> AEGIS-X</span>
    </div>

    <div class="card">
      <div class="card-label">Available Balance</div>
      <div class="card-balance" id="balance">₹5,42,000</div>
      <div class="card-number">4521 •••• •••• 7890</div>
      <div style="display:flex;justify-content:space-between;margin-top:8px">
        <span class="card-label">DEMO USER</span>
        <span class="card-label">EXP 12/28</span>
      </div>
    </div>

    <div style="background:var(--bg-card);border-radius:14px;border:1px solid rgba(255,255,255,0.06);padding:18px 20px">
      <h2 style="font-size:14px;font-weight:700;margin-bottom:14px">Fund Transfer</h2>

      <div class="form-group">
        <label>Beneficiary</label>
        <select id="beneficiary">
          <option value="known">Ravi Sharma — SBI ••4521</option>
          <option value="known">Priya Mehta — HDFC ••2234</option>
          <option value="new">Unknown Vendor — Axis ••9087 ⚠️ NEW</option>
          <option value="new">Suspicious Entity — PNB ••6661 ⚠️ NEW</option>
        </select>
      </div>

      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="text" id="amount" placeholder="Enter amount" autocomplete="off">
      </div>

      <div class="form-group">
        <label>Remarks</label>
        <input type="text" id="remarks" placeholder="Payment for..." autocomplete="off">
      </div>

      <button class="btn" id="transferBtn" onclick="handleTransfer()">
        Send ₹0
      </button>

      <div class="result" id="result">
        <span class="icon"></span>
        <div>
          <div class="text"></div>
          <div class="sub"></div>
        </div>
      </div>
    </div>

    <div class="trust-panel">
      <div class="title">AEGIS-X Live Telemetry</div>
      <div class="metric-row"><span class="label">Trust Score</span><span class="value" id="mTrust" style="color:#10B981">—</span></div>
      <div class="metric-row"><span class="label">Decision</span><span class="value" id="mDecision" style="color:#10B981">—</span></div>
      <div class="metric-row"><span class="label">Cognitive State</span><span class="value" id="mState" style="color:#3B82F6">—</span></div>
      <div class="metric-row"><span class="label">Similarity</span><span class="value" id="mSim">—</span></div>
      <div class="metric-row"><span class="label">Drift</span><span class="value" id="mDrift" style="color:#10B981">—</span></div>
      <div class="metric-row"><span class="label">Anomaly</span><span class="value" id="mAnomaly">—</span></div>
      <div class="metric-row"><span class="label">Fraud Prob</span><span class="value" id="mFraud">—</span></div>
      <div class="metric-row"><span class="label">Latency</span><span class="value" id="mLatency" style="color:#8B5CF6">—</span></div>
      <div class="metric-row"><span class="label">Events</span><span class="value" id="mEvents" style="color:#3B82F6">—</span></div>
    </div>

    <div class="log" id="log">
      <div class="entry">$ aegisx-sdk --init</div>
    </div>
  </div>

  <script>
    // ─── AEGIS-X SDK (inline for demo — production uses npm package) ───
    const WS_URL = `ws://${window.location.hostname}:8000`;
    let ws = null;
    let balance = 542000;
    let lastTrust = null;
    let keyTimes = [];
    let corrections = 0;
    let totalKeys = 0;
    let pauses = 0;
    let lastKeyTime = 0;

    // Connect WebSocket
    function connectSDK() {
      const userId = 'webapp_demo_' + Date.now();
      ws = new WebSocket(`${WS_URL}/ws/${userId}`);
      
      ws.onopen = () => {
        document.getElementById('statusDot').className = 'status-dot online';
        addLog('WebSocket connected — session ' + userId, 'trust');
      };
      
      ws.onclose = () => {
        document.getElementById('statusDot').className = 'status-dot offline';
        addLog('WebSocket disconnected', 'alert');
      };
      
      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.trust_score !== undefined) {
            lastTrust = data;
            updateMetrics(data);
          }
        } catch(e) {}
      };
    }

    // Update UI metrics from backend response
    function updateMetrics(d) {
      const ts = (d.trust_score || 0) * 100;
      const color = ts > 85 ? '#10B981' : ts > 60 ? '#F59E0B' : '#EF4444';
      
      document.getElementById('mTrust').textContent = ts.toFixed(1) + '%';
      document.getElementById('mTrust').style.color = color;
      document.getElementById('mDecision').textContent = d.decision || '—';
      document.getElementById('mDecision').style.color = d.decision === 'ALLOW' ? '#10B981' : d.decision === 'BLOCK' ? '#EF4444' : '#F59E0B';
      document.getElementById('mState').textContent = (d.cognitive_state || '—').toUpperCase();
      document.getElementById('mSim').textContent = ((d.similarity || 1) * 100).toFixed(1) + '%';
      document.getElementById('mDrift').textContent = d.drift_detected ? d.drift_severity.toUpperCase() : 'NONE';
      document.getElementById('mDrift').style.color = d.drift_detected ? '#EF4444' : '#10B981';
      document.getElementById('mAnomaly').textContent = ((d.anomaly?.score || 0) * 100).toFixed(0) + '%';
      document.getElementById('mFraud').textContent = ((d.fraud?.probability || 0) * 100).toFixed(0) + '%';
      document.getElementById('mFraud').style.color = (d.fraud?.probability || 0) > 0.3 ? '#EF4444' : '#10B981';
      document.getElementById('mLatency').textContent = (d.latency_ms || 0).toFixed(0) + 'ms';
      document.getElementById('mEvents').textContent = d.event_number || 0;
      
      addLog(`Trust: ${ts.toFixed(0)}% | ${d.cognitive_state} | ${d.decision} | ${(d.latency_ms||0).toFixed(0)}ms`, 'trust');
    }

    // Send behavioral features every 2 seconds
    function flushFeatures() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      
      const elapsed = 2;
      const speed = totalKeys / Math.max(elapsed, 0.1);
      const corrRate = totalKeys > 0 ? corrections / totalKeys : 0;
      const hesRatio = totalKeys > 0 ? pauses / totalKeys : 0;
      
      let flight = 150;
      if (keyTimes.length > 1) {
        let sum = 0;
        for (let i = 1; i < keyTimes.length; i++) sum += keyTimes[i] - keyTimes[i-1];
        flight = sum / (keyTimes.length - 1);
      }
      
      const features = {
        typing_speed_cps: Math.min(12, speed),
        key_hold_mean_ms: 80 + Math.random() * 40,
        key_flight_mean_ms: flight,
        typing_burst_ratio: Math.min(1, totalKeys / 20),
        correction_rate: corrRate,
        pause_frequency: Math.min(1, pauses / Math.max(totalKeys, 1)),
        hesitation_ratio: hesRatio,
        long_pause_count: pauses,
        tap_interval_mean_ms: 200 + Math.random() * 100,
        tap_duration_mean_ms: 100 + Math.random() * 50,
        swipe_velocity_mean: 1.0 + Math.random() * 0.5,
        swipe_straightness: 0.8 + Math.random() * 0.15,
        scroll_speed_mean: Math.random() * 200,
        scroll_reversals: Math.floor(Math.random() * 2),
        gyroscope_variance: 0.01 + Math.random() * 0.02,
        accelerometer_jerk: 0.5 + Math.random() * 1.0,
      };
      
      const amt = parseInt(document.getElementById('amount').value) || 0;
      const isNew = document.getElementById('beneficiary').value === 'new';
      
      ws.send(JSON.stringify({
        type: 'behavioral_event',
        event: features,
        transaction_amount: amt,
        is_new_beneficiary: isNew,
      }));
      
      // Reset counters
      keyTimes = [];
      corrections = 0;
      totalKeys = 0;
      pauses = 0;
    }

    // Keyboard capture
    document.addEventListener('keydown', (e) => {
      const now = performance.now();
      if (lastKeyTime > 0 && now - lastKeyTime > 2000) pauses++;
      if (e.key === 'Backspace') corrections++;
      totalKeys++;
      keyTimes.push(now);
      lastKeyTime = now;
    });

    // Amount input update button text
    document.getElementById('amount').addEventListener('input', (e) => {
      const v = parseInt(e.target.value) || 0;
      document.getElementById('transferBtn').textContent = `Send ₹${v.toLocaleString()}`;
    });

    // Transfer handler
    function handleTransfer() {
      const amt = parseInt(document.getElementById('amount').value);
      if (!amt) return;
      
      const btn = document.getElementById('transferBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Verifying behavioral identity...';
      
      addLog('⚡ Transfer initiated — ₹' + amt.toLocaleString());
      
      setTimeout(() => {
        const d = lastTrust?.decision || 'ALLOW';
        const ts = (lastTrust?.trust_score || 0.95) * 100;
        const result = document.getElementById('result');
        
        if (d === 'ALLOW' && ts > 80) {
          balance -= amt;
          document.getElementById('balance').textContent = '₹' + balance.toLocaleString();
          result.className = 'result show allow';
          result.querySelector('.icon').textContent = '✅';
          result.querySelector('.text').textContent = 'TRANSACTION APPROVED';
          result.querySelector('.text').style.color = '#10B981';
          result.querySelector('.sub').textContent = `Trust: ${ts.toFixed(0)}% · Behavioral identity verified`;
          addLog('✅ APPROVED — ₹' + amt.toLocaleString() + ' deducted', 'trust');
        } else if (d === 'BLOCK' || ts < 60) {
          result.className = 'result show block';
          result.querySelector('.icon').textContent = '⛔';
          result.querySelector('.text').textContent = 'TRANSACTION BLOCKED';
          result.querySelector('.text').style.color = '#EF4444';
          result.querySelector('.sub').textContent = `Trust: ${ts.toFixed(0)}% · Anomalous behavior detected · State: ${lastTrust?.cognitive_state || 'unknown'}`;
          addLog('⛔ BLOCKED — Fraud risk: ' + ((lastTrust?.fraud?.probability||0)*100).toFixed(0) + '%', 'alert');
        } else {
          result.className = 'result show stepup';
          result.querySelector('.icon').textContent = '⚠️';
          result.querySelector('.text').textContent = 'STEP-UP VERIFICATION';
          result.querySelector('.text').style.color = '#F59E0B';
          result.querySelector('.sub').textContent = `Trust: ${ts.toFixed(0)}% · OTP sent to registered mobile`;
          addLog('⚠️ STEP-UP required — Trust: ' + ts.toFixed(0) + '%');
        }
        
        btn.disabled = false;
        btn.textContent = `Send ₹${amt.toLocaleString()}`;
      }, 1200);
    }

    function addLog(msg, type = '') {
      const log = document.getElementById('log');
      const div = document.createElement('div');
      div.className = 'entry ' + type;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    // Init
    connectSDK();
    setInterval(flushFeatures, 2000);
  </script>
</body>
</html>
